name: quizwizz-staging

services:
  frontend:
    container_name: quizwizz-staging-frontend-1
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - VITE_PROXY_TARGET=http://backend:8080
    labels:
      - traefik.enable=true
      - traefik.http.routers.quizwizz-staging-frontend.rule=Host(`${STAGING_HOST}`)
      - traefik.http.routers.quizwizz-staging-frontend.entrypoints=web
      - traefik.http.routers.quizwizz-staging-frontend.priority=1
      - traefik.http.services.quizwizz-staging-frontend.loadbalancer.server.port=3000
    depends_on:
      - backend
    networks:
      - dokploy-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 192M

  backend:
    container_name: quizwizz-staging-backend-1
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-this-in-dokploy}
      - DEBUG=${DEBUG:-0}
      - STAGING_HOST=${STAGING_HOST:-quiz.tomag.xyz}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-${STAGING_HOST:-*}}
      - CORS_ALLOW_ALL_ORIGINS=${CORS_ALLOW_ALL_ORIGINS:-0}
      - CORS_ALLOW_CREDENTIALS=${CORS_ALLOW_CREDENTIALS:-1}
      - CORS_ORIGIN_WHITELIST=${CORS_ORIGIN_WHITELIST:-https://${STAGING_HOST:-quiz.tomag.xyz}}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://${STAGING_HOST:-quiz.tomag.xyz}}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-1}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-1}
    labels:
      - traefik.enable=true
      - traefik.http.routers.quizwizz-staging-backend.rule=Host(`${STAGING_HOST}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/media`))
      - traefik.http.routers.quizwizz-staging-backend.entrypoints=web
      - traefik.http.routers.quizwizz-staging-backend.priority=10
      - traefik.http.services.quizwizz-staging-backend.loadbalancer.server.port=8080
    networks:
      - dokploy-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 256M

networks:
  dokploy-network:
    external: true